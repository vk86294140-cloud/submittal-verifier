# One-click deploy to Render (https://render.com). In the Render dashboard:
# New + > Blueprint > connect this repo. It reads this file.
services:
  - type: web
    name: speccheck
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      # Set a real value in the Render dashboard, do not commit secrets.
      - key: SPECCHECK_PASSWORD
        sync: false
      - key: SPECCHECK_USER
        value: admin
      - key: SPECCHECK_DB
        value: /data/speccheck.db
    disk:
      name: speccheck-data
      mountPath: /data
      sizeGB: 1
